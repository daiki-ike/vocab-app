name: keep-warm

# Render無料プランは15分無操作でスリープ→次回起動が遅い。
# 10分ごとにアクセスして起こし続け、常に即起動の状態を保つ。
on:
  schedule:
    # 日本時間 6:00〜24:00 だけ10分ごとに起こす（深夜は寝かせてRender無料枠750時間に余裕を持たせる）
    # UTC表記: JST = UTC+9。JST6:00-24:00 = UTC21:00-15:00。
    - cron: '*/10 21-23 * * *'
    - cron: '*/10 0-14 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: アプリにアクセスしてスリープを防ぐ
        run: |
          code=$(curl -sS -m 90 -o /dev/null -w "%{http_code}" https://vocab-app-12uv.onrender.com/ || true)
          echo "応答コード: $code"
